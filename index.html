select,
button{

.card-a{font-size:17px;color:var(--text-primary);line-height:1.5}

.prog-wrap{flex:1;height:5px;background:var(--border-strong);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--text-success));border-radius:99px;transition:width .3s}
.pos-lbl{font-size:13px;color:var(--text-secondary);min-width:52px;text-align:right}

let deck=[], idx=0, flipped=false, gotSet=new Set(), missSet=new Set();

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function load(cards){
  deck=[...cards]; idx=0; flipped=false; gotSet=new Set(); missSet=new Set();
  document.getElementById('result-box').style.display='none';
  document.getElementById('stage').style.display='';
  document.getElementById('grade-row').style.visibility='hidden';
  render(); updateStats();
}

function render(){
  if(!deck.length)return;
  const[dom,q,a]=deck[idx];
  document.getElementById('cd-front').textContent=dom;
  document.getElementById('cd-back').textContent=dom;
  document.getElementById('card-q').textContent=q;
  document.getElementById('card-a').textContent=a;
  document.getElementById('card-inner').classList.remove('flipped');
  flipped=false;
  document.getElementById('grade-row').style.visibility='hidden';
  const pct=Math.round(((idx+1)/deck.length)*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('pos').textContent=(idx+1)+' / '+deck.length;
}

function flip(){
  if(flipped)return;
  document.getElementById('card-inner').classList.add('flipped');
  flipped=true;
  document.getElementById('grade-row').style.visibility='visible';
}

function grade(got){
  if(got)gotSet.add(idx); else missSet.add(idx);
  updateStats();
  if(idx<deck.length-1){idx++;render();}else showResult();
}

function next(){if(idx<deck.length-1){idx++;render();}}
function prev(){if(idx>0){idx--;render();}}

function doShuffle(){
  const sel=document.getElementById('dom-sel').value;
  load(shuffle(sel==='all'?[...D]:D.filter(c=>c[0]===sel)));
}

function changeDomain(){
  const sel=document.getElementById('dom-sel').value;
  load(sel==='all'?[...D]:D.filter(c=>c[0]===sel));
}

function drillMissed(){
  const cards=[...missSet].map(i=>deck[i]);
  if(cards.length)load(cards);
}

function restart(){changeDomain();}

function updateStats(){
  document.getElementById('s-total').textContent=deck.length;
  document.getElementById('s-got').textContent=gotSet.size;
  document.getElementById('s-miss').textContent=missSet.size;
  document.getElementById('s-left').textContent=deck.length-gotSet.size-missSet.size;
  const mb=document.getElementById('btn-missed');
  if(missSet.size>0){mb.style.display='';document.getElementById('missed-n').textContent=missSet.size;}
  else mb.style.display='none';
}

function showResult(){
  const total=gotSet.size+missSet.size||1;
  const pct=Math.round((gotSet.size/total)*100);
  const sc=document.getElementById('r-score');
  sc.textContent=pct+'%';
  sc.style.color=pct>=80?'var(--text-success)':pct>=60?'var(--text-warning)':'var(--text-danger)';
  document.getElementById('r-msg').textContent=pct>=80?'Solid — you know this material.':pct>=60?'Getting there — drill the missed ones.':'Keep going — repetition builds retention.';
  document.getElementById('r-drill').style.display=missSet.size>0?'':'none';
  document.getElementById('stage').style.display='none';
  document.getElementById('grade-row').style.visibility='hidden';
  document.getElementById('result-box').style.display='block';
}

document.addEventListener('keydown',e=>{
  if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName))return;
  if(e.key===' '){e.preventDefault();flip();}
  else if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if((e.key==='g'||e.key==='G')&&flipped)grade(true);
  else if((e.key==='m'||e.key==='M')&&flipped)grade(false);
});

load([...D]);
</script>
